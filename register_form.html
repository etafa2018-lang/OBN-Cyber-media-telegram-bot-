<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Registration</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--tg-theme-bg-color);
            padding: 20px;
            transition: background 0.2s;
        }
        .form-card {
            background: var(--tg-theme-secondary-bg-color);
            border-radius: 25px;
            padding: 30px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            transition: 0.3s;
        }
        .form-card:hover {
            transform: translateY(-5px);
        }
        h1 {
            color: var(--tg-theme-text-color);
            font-weight: 600;
            margin-bottom: 10px;
            font-size: 28px;
            text-align: center;
        }
        .subtitle {
            color: var(--tg-theme-hint-color);
            text-align: center;
            margin-bottom: 25px;
            font-size: 14px;
        }
        .input-group {
            margin-bottom: 20px;
            position: relative;
        }
        .input-group i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--tg-theme-hint-color);
            font-size: 18px;
            transition: color 0.2s;
        }
        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--tg-theme-text-color);
        }
        input, select {
            width: 100%;
            padding: 14px 15px 14px 45px;
            border: 2px solid var(--tg-theme-hint-color);
            border-radius: 12px;
            font-size: 15px;
            transition: 0.2s;
            background: var(--tg-theme-bg-color);
            color: var(--tg-theme-text-color);
        }
        input:focus, select:focus {
            border-color: var(--tg-theme-button-color);
            outline: none;
            background: var(--tg-theme-secondary-bg-color);
        }
        input::placeholder, select::placeholder {
            color: var(--tg-theme-hint-color);
            opacity: 0.7;
        }
        button {
            width: 100%;
            padding: 16px;
            background: var(--tg-theme-button-color);
            color: var(--tg-theme-button-text-color);
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        button:hover {
            opacity: 0.9;
            transform: scale(1.02);
        }
        button i {
            margin-right: 8px;
        }
        .note {
            margin-top: 15px;
            font-size: 12px;
            color: var(--tg-theme-hint-color);
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="form-card">
        <h1><i class="fas fa-user-plus"></i> Registration</h1>
        <div class="subtitle">Join OBN Cyber Media</div>
        <form id="regForm">
            <div class="input-group">
                <i class="fas fa-user"></i>
                <label for="full_name">Full Name *</label>
                <input type="text" id="full_name" required placeholder="e.g., Abebe Kebede">
            </div>
            <div class="input-group">
                <i class="fas fa-venus-mars"></i>
                <label for="sex">Sex *</label>
                <select id="sex" required>
                    <option value="">-- Select --</option>
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                </select>
            </div>
            <div class="input-group">
                <i class="fas fa-building"></i>
                <label for="muummee">Muummee *</label>
                <select id="muummee" required>
                    <option value="">-- Select --</option>
                    <option value="Cyber media">Cyber media</option>
                    <option value="Sagantaa">Sagantaa</option>
                    <option value="Tibbanaafi Gulaanaa">Tibbanaafi Gulaanaa</option>
                    <option value="Horn of Africa">Horn of Africa</option>
                    <option value="Teekinooloojii">Teekinooloojii</option>
                    <option value="Bulchiinsaafi faayinansii">Bulchiinsaafi faayinansii</option>
                    <option value="Qoannoofi qo'annoo">Qoannoofi qo'annoo</option>
                </select>
            </div>
            <div class="input-group">
                <i class="fas fa-briefcase"></i>
                <label for="gahe">Gahe Hojii *</label>
                <select id="gahe" required>
                    <option value="">-- Select --</option>
                    <option value="Daarikteera">Daarikteera</option>
                    <option value="Qopheessa">Qopheessa</option>
                    <option value="Gulaalaa qophii">Gulaalaa qophii</option>
                    <option value="Gulaalaa sur-sagalee">Gulaalaa sur-sagalee</option>
                    <option value="Export">Export</option>
                    <option value="Streaming">Streaming</option>
                </select>
            </div>
            <div class="input-group" id="gitaGroup" style="display:none;">
                <i class="fas fa-layer-group"></i>
                <label for="gita">Gita</label>
                <select id="gita">
                    <option value="">-- Select --</option>
                    <option value="Deskii">Deskii</option>
                    <option value="Ogeessa">Ogeessa</option>
                </select>
            </div>
            <button type="submit"><i class="fas fa-paper-plane"></i> Register</button>
        </form>
        <div class="note">All fields marked * are required</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const gaheSelect = document.getElementById('gahe');
        const gitaGroup = document.getElementById('gitaGroup');

        gaheSelect.addEventListener('change', function() {
            if (this.value === 'Export' || this.value === 'Streaming') {
                gitaGroup.style.display = 'block';
            } else {
                gitaGroup.style.display = 'none';
                document.getElementById('gita').value = '';
            }
        });

        document.getElementById('regForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const data = {
                full_name: document.getElementById('full_name').value.trim(),
                sex: document.getElementById('sex').value,
                muummee: document.getElementById('muummee').value,
                gahe: document.getElementById('gahe').value,
                gita: document.getElementById('gita').value || null
            };

            if (!data.full_name || !data.sex || !data.muummee || !data.gahe) {
                tg.showAlert('Please fill all required fields.');
                return;
            }

            tg.sendData(JSON.stringify(data));
            tg.close();
        });
    </script>
</body>
</html>
